<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Commodity Trade Atlas v0.1</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: #0d130f;
        color: #f6edd8;
      }

      .boot-fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        box-sizing: border-box;
        font-family: Georgia, serif;
        background:
          radial-gradient(circle at 18% 16%, rgba(231, 184, 78, 0.18), transparent 28rem),
          linear-gradient(135deg, #090d0b, #17231c 56%, #0b100d);
      }

      .boot-fallback > div {
        max-width: 34rem;
        padding: 1.5rem;
        border: 1px solid rgba(232, 201, 134, 0.22);
        border-radius: 1.2rem;
        background: rgba(18, 27, 22, 0.82);
      }
    </style>
    <script>
      window.addEventListener('error', (event) => {
        const root = document.getElementById('root');
        if (!root || root.dataset.reactMounted === 'true') return;
        root.innerHTML =
          '<main class="boot-fallback"><div><p>Browser module error</p><h1>The atlas could not boot.</h1><pre>' +
          String(event.message || 'Unknown script error') +
          '</pre></div></main>';
      });
      window.addEventListener('unhandledrejection', (event) => {
        const root = document.getElementById('root');
        if (!root || root.dataset.reactMounted === 'true') return;
        root.innerHTML =
          '<main class="boot-fallback"><div><p>Unhandled module rejection</p><h1>The atlas could not boot.</h1><pre>' +
          String(event.reason && event.reason.message ? event.reason.message : event.reason) +
          '</pre></div></main>';
      });
    </script>
  </head>
  <body>
    <div id="root">
      <main class="boot-fallback">
        <div>
          <p>Global Commodity Trade Atlas</p>
          <h1>Booting the flow engine...</h1>
          <p>If this stays here, the JavaScript entry module did not start.</p>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
